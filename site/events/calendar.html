<!-- title: Calendar -->
<div class="wrap">
  <h1>Calendar</h1>
  <div class="page-section">
    <p>Every logged Weekly Mini, past and upcoming. Use the arrows to browse other months.</p>
    <div class="card">
      <div class="calendar-header">
        <button class="calendar-nav-btn secondary" id="calPrev">&larr; Prev</button>
        <h2 id="calMonthLabel"></h2>
        <button class="calendar-nav-btn secondary" id="calNext">Next &rarr;</button>
      </div>
      <div class="calendar-grid" id="calGrid"></div>
      <div class="calendar-legend">
        <span><span class="swatch past"></span>Played</span>
        <span><span class="swatch upcoming"></span>Upcoming</span>
      </div>
      <div id="calStatus" class="placeholder-note" style="display:none; margin-top:12px;"></div>
    </div>
  </div>
</div>

<script>
(function(){
  var DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var MONTH_LABELS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function toIso(d){
    // Local-calendar-date ISO string, not UTC -- toISOString() would shift the date for anyone
    // browsing from a timezone ahead of UTC (local midnight is still "yesterday" in UTC there).
    var m = String(d.getMonth()+1).padStart(2,'0');
    var day = String(d.getDate()).padStart(2,'0');
    return d.getFullYear() + '-' + m + '-' + day;
  }

  var todayIso = toIso(new Date());
  var view = new Date(); view.setDate(1);
  var eventsByDate = {}; // 'YYYY-MM-DD' -> [{title, slug, isPast}]

  function addEvent(date, title, slug, isPast){
    if(!date) return;
    (eventsByDate[date] = eventsByDate[date] || []).push({title: title, slug: slug, isPast: isPast});
  }

  function render(){
    document.getElementById('calMonthLabel').textContent = MONTH_LABELS[view.getMonth()] + ' ' + view.getFullYear();
    var grid = document.getElementById('calGrid');
    var html = DAY_LABELS.map(function(d){ return '<div class="calendar-daylabel">'+d+'</div>'; }).join('');

    var firstOfMonth = new Date(view.getFullYear(), view.getMonth(), 1);
    var startOffset = firstOfMonth.getDay(); // 0=Sun
    var gridStart = new Date(firstOfMonth);
    gridStart.setDate(gridStart.getDate() - startOffset);

    for(var i = 0; i < 42; i++){
      var cellDate = new Date(gridStart);
      cellDate.setDate(gridStart.getDate() + i);
      var iso = toIso(cellDate);
      var inMonth = cellDate.getMonth() === view.getMonth();
      var classes = 'calendar-day' + (inMonth ? '' : ' other-month') + (iso === todayIso ? ' today' : '');
      var chips = (eventsByDate[iso] || []).map(function(ev){
        var cls = ev.isPast ? 'past' : 'upcoming';
        var label = ev.title.length > 22 ? ev.title.slice(0,21) + '…' : ev.title;
        return '<span class="calendar-event-chip ' + cls + '" title="' + ev.title.replace(/"/g,'&quot;') + '">' + label + '</span>';
      }).join('');
      html += '<div class="' + classes + '"><div class="day-num">' + cellDate.getDate() + '</div>' + chips + '</div>';
    }
    grid.innerHTML = html;
  }

  document.getElementById('calPrev').addEventListener('click', function(){
    view.setMonth(view.getMonth() - 1); render();
  });
  document.getElementById('calNext').addEventListener('click', function(){
    view.setMonth(view.getMonth() + 1); render();
  });

  render(); // draw the grid immediately with whatever data has loaded so far (starts empty)

  fetch('../artifact_data.json').then(function(r){ return r.json(); }).then(function(data){
    (data.events || []).forEach(function(ev){ addEvent(ev[2], ev[1], ev[0], true); });
    render();
  }).catch(function(){
    var s = document.getElementById('calStatus');
    s.style.display = 'block';
    s.textContent = 'Could not load past event data.';
  });

  fetch('../data/upcoming-events.json').then(function(r){ return r.json(); }).then(function(data){
    (data.events || []).forEach(function(ev){ addEvent(ev.date, ev.title, ev.slug, false); });
    render();
  }).catch(function(){}); // fine if this file is empty/missing -- just no upcoming chips
})();
</script>
