<div class="panel" id="panel-chat">
    <div class="card">
      <div id="chatMessages" class="chat-messages"><div class="chat-empty">Ask anything about the league — standings, head-to-heads, hole difficulty, streaks, winnings, whatever. Answers are generated from the data currently in scope (the season filter above applies here too).</div></div>
      <div class="row" style="margin-top:10px; margin-bottom:0;">
        <input type="text" id="chatInput" placeholder="Ask a question about the league data…" style="flex:1; min-width:220px;">
        <button id="chatSend">Send</button>
        <button id="chatClear" class="secondary">Clear chat</button>
      </div>
    </div>
  </div>
